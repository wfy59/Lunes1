name: Lunes Host 自动保活

on:
  schedule:
    # 每10天运行：1号、11号、21号 中午12:12（北京时间）
    # UTC = 北京时间 - 8小时
    - cron: '12 4 1,11,21 * *'

  workflow_dispatch:


jobs:
  keepalive:

    name: 执行保活

    runs-on: ubuntu-latest


    permissions:
      contents: read
      actions: write


    concurrency:
      group: lunes-keepalive
      cancel-in-progress: false


    steps:


      - name: 拉取仓库
        uses: actions/checkout@v4



      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'



      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y wget tar xvfb
          pip install seleniumbase>=4.25.0 pyvirtualdisplay>=3.0 requests>=2.31.0



      # =========================
      # HY2 自动转换 sing-box
      # =========================
      - name: 配置 sing-box 代理
        env:
          HY2_URL: ${{ secrets.HY2_URL }}

        run: |

          if [ -z "$HY2_URL" ]; then
            echo "HY2_URL 未设置，使用直连模式"
            echo "PROXY_SERVER=" >> $GITHUB_ENV
            exit 0
          fi



          echo "下载 sing-box"



          wget -q \
          https://github.com/SagerNet/sing-box/releases/latest/download/sing-box-linux-amd64.tar.gz \
          -O sing-box.tar.gz



          tar -xzf sing-box.tar.gz



          sudo mv sing-box-*/sing-box /usr/local/bin/sing-box

          sudo chmod +x /usr/local/bin/sing-box



          echo "解析 HY2 地址"



          URL="${HY2_URL#hysteria2://}"

          URL="${URL#hy2://}"



          PASSWORD="${URL%%@*}"



          SERVER_PART="${URL#*@}"

          SERVER="${SERVER_PART%%/*}"



          HOST="${SERVER%%:*}"

          PORT="${SERVER##*:}"



          SNI=$(echo "$HY2_URL" | grep -oP 'sni=\K[^&]+' || echo "$HOST")



          cat > sing-box.json <<EOF
{
  "log": {
    "level": "info"
  },


  "inbounds": [
    {
      "type": "mixed",
      "listen": "127.0.0.1",
      "listen_port": 7890
    }
  ],


  "outbounds": [
    {
      "type": "hysteria2",
      "server": "$HOST",
      "server_port": $PORT,
      "password": "$PASSWORD",

      "tls": {
        "enabled": true,
        "server_name": "$SNI",
        "insecure": true
      }
    }
  ]
}
EOF



          echo "sing-box 配置完成"

          cat sing-box.json



          echo "启动 sing-box"



          sing-box run -c sing-box.json &



          sleep 5



          echo "PROXY_SERVER=http://127.0.0.1:7890" >> $GITHUB_ENV





      # =========================
      # 执行 Lunes 保活
      # =========================

      - name: 执行保活

        env:

          LUNES: ${{ secrets.LUNES }}

          TELEGRAM_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}

          TELEGRAM_CHAT_ID: ${{ secrets.TG_CHAT_ID }}

        run: |

          python scripts/Lunes-Keep.py





      # =========================
      # 清理旧运行
      # =========================

      - name: 清理旧运行

        uses: Mattraks/delete-workflow-runs@v2

        with:

          token: ${{ github.token }}

          repository: ${{ github.repository }}

          delete_workflow_pattern: ${{ github.workflow }}

          retain_days: 0

          keep_minimum_runs: 3